                document.body.style.background = '';
            }
            
            render();
            window.scrollTo(0, 0);
        }

        function setupEventListeners() {
            document.addEventListener('click', function(e) {
                const target = e.target;
                
                // Handle navigation links
                if (target.matches('[data-page]') || target.closest('[data-page]')) {
                    e.preventDefault();
                    const page = target.closest('[data-page]').getAttribute('data-page');
                    navigateTo(page);
                }
                
                // Handle mobile toggle
                if (target.matches('#mobile-toggle') || target.closest('#mobile-toggle')) {
                    document.querySelector('.nav-links')?.classList.toggle('mobile-open');
                }
                
                // Handle theme toggle
                if (target.matches('#theme-toggle') || target.matches('#theme-toggle-user') || 
                    target.closest('#theme-toggle') || target.closest('#theme-toggle-user')) {
                    toggleTheme();
                }
                
                // Handle logout button
                if (target.matches('#logout-btn') || target.closest('#logout-btn')) {
                    e.preventDefault();
                    logout();
                }
                
                // Handle purchase buttons
                if (target.matches('[data-purchase]') || target.closest('[data-purchase]')) {
                    e.preventDefault();
                    const courseId = parseInt(target.closest('[data-purchase]').getAttribute('data-purchase'));
                    showPaymentModal(courseId);
                }
                
                // Handle course cards - FIXED: Now properly handles clicks on course cards and buttons
                if (target.closest('[data-course]')) {
                    e.preventDefault();
                    const courseElement = target.closest('[data-course]');
                    if (courseElement) {
                        const courseId = parseInt(courseElement.getAttribute('data-course'));
                        openCoursePlayer(courseId);
                    }
                }
                
                // Handle lesson clicks in playlist
                if (target.matches('[data-lesson]') || target.closest('[data-lesson]')) {
                    e.preventDefault();
                    const lessonElement = target.closest('[data-lesson]');
                    if (lessonElement && App.currentCourse) {
                        const lessonId = parseInt(lessonElement.getAttribute('data-lesson'));
                        App.currentLesson = lessonId - 1;
                        render();
                    }
                }
                
                // Handle mark complete button
                if (target.matches('[data-mark-complete]') || target.closest('[data-mark-complete]')) {
                    e.preventDefault();
                    if (App.currentCourse) {
                        const lessonId = App.currentLesson + 1;
                        markLessonComplete(App.currentCourse.id, lessonId);
                    }
                }
            });
            
            // Handle form submissions
            document.addEventListener('submit', function(e) {
                if (e.target.id === 'login-form') {
                    e.preventDefault();
                    login(
                        document.getElementById('login-email')?.value,
                        document.getElementById('login-password')?.value
                    );
                }
                
                if (e.target.id === 'register-form') {
                    e.preventDefault();
                    register({
                        name: document.getElementById('register-name')?.value,
                        email: document.getElementById('register-email')?.value,
                        phone: document.getElementById('register-phone')?.value,
                        password: document.getElementById('register-password')?.value,
                        confirmPassword: document.getElementById('register-confirm-password')?.value
                    });
                }
                
                if (e.target.id === 'contact-form') {
                    e.preventDefault();
                    showNotification('Message sent successfully!', 'success');
                    e.target.reset();
                }
            });
        }

                        ${isPaid ? '<span class="paid-badge"><i class="fas fa-crown"></i> PREMIUM</span>' : ''}

                    </div>
                    <div class="course-content">
                        <span class="course-category">${course.category}</span>
                        <h3 class="course-title">${course.title}</h3>
                        <div class="course-instructor">
                            <i class="fas fa-chalkboard-teacher"></i> ${course.instructor}
                        </div>
                        <div class="course-meta">
                            <div class="stars">${generateStars(course.rating)}</div>
                            <span class="course-level">${course.level}</span>
                        </div>
                        ${isPaid ? `
                            <div class="course-price">

                            </div>
                        ` : ''}
                        <div class="course-footer">
                            <div class="course-duration">
                                <i class="far fa-clock"></i> ${course.duration}
                            </div>
                            ${!hasAccess ? `
                                ${isPaid ? `
                                    <button class="purchase-btn" data-purchase="${course.id}">

        function renderCoursePlayer() {
            if (!App.currentCourse) return '';
            
            const course = App.currentCourse;
            const currentLesson = App.currentLesson;
            const lesson = App.lessons[currentLesson] || App.lessons[0];
            const progress = App.progress[course.id] || { completedLessonsList: [], percentage: 0, completedLessons: 0, totalLessons: 10 };
            const isCompleted = progress.completedLessonsList.includes(currentLesson + 1);
            
            return `
                <div class="course-player-container">
                    <button class="back-btn" onclick="navigateTo('dashboard')">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </button>
                    
                    <div class="course-player-grid">
                        <div class="video-section">
                            <div class="video-wrapper">
                                <iframe src="https://www.youtube.com/embed/${course.videoId}?autoplay=1" allowfullscreen></iframe>
                            </div>
                            
                            <div class="course-info">
                                <h1>${course.title}</h1>
                                <div class="instructor">
                                    <i class="fas fa-chalkboard-teacher"></i> ${course.instructor}
                                </div>
                                <p class="description">${course.description}</p>
                            </div>
                            
                            <div class="progress-info">
                                <div class="progress-header">
                                    <h3>Course Progress</h3>
                                    <span class="progress-percentage">${progress.percentage}% Complete</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress.percentage}%"></div>
                                </div>
                                <div class="progress-stats">
                                    <span><i class="fas fa-check-circle"></i> ${progress.completedLessons} of ${progress.totalLessons} lessons completed</span>
                                </div>
                            </div>
                            
                            <button class="mark-complete-btn" data-mark-complete ${isCompleted ? 'disabled' : ''}>
                                <i class="fas ${isCompleted ? 'fa-check-circle' : 'fa-check-circle'}"></i>
                                ${isCompleted ? 'Lesson Completed' : 'Mark Current Lesson Complete'}
                            </button>
                        </div>
                        
                        <div class="playlist-section">
                            <div class="playlist-header">
                                <h3>
                                    <i class="fas fa-list"></i>
                                    Course Content
                                </h3>
                                <p>${App.lessons.length} lessons</p>
                            </div>
                            <div class="playlist-items">
                                ${App.lessons.map((l, index) => {
                                    const isActive = index === currentLesson;
                                    const isLessonCompleted = progress.completedLessonsList.includes(index + 1);
                                    return `
                                        <div class="playlist-item ${isLessonCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}" data-lesson="${index + 1}">
                                            <div class="playlist-item-number">${index + 1}</div>
                                            <div class="playlist-item-info">
                                                <h4>${l.title}</h4>
                                                <p>${l.description}</p>
                                            </div>
                                            <div class="playlist-item-duration">
                                                <i class="far fa-clock"></i> ${l.duration}
                                            </div>
                                            ${isLessonCompleted ? '<div class="playlist-item-status"><i class="fas fa-check-circle"></i></div>' : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            if (!App.user) {
                navigateTo('login');
                return renderLogin();
            }
            
            const allCourses = [...App.courses, ...App.paidCourses];
            const enrolledCourses = allCourses.filter(c => App.enrollments?.includes(c.id));
            
            const totalCourses = enrolledCourses.length;
            const freeCourses = enrolledCourses.filter(c => c.type === 'free').length;
            const paidCoursesCount = enrolledCourses.filter(c => c.type === 'paid').length;
            const completedCourses = App.certificates.length;
            const totalLessonsCompleted = Object.values(App.progress).reduce((acc, curr) => acc + (curr.completedLessons || 0), 0);
            const totalSpent = App.purchases.reduce((acc, curr) => acc + curr.amount, 0);
            
            return `
                <div class="dashboard-grid">
                    <aside class="dashboard-sidebar">
                        <div class="sidebar-header">
                            <div class="user-avatar-large">
                                <i class="fas fa-user-graduate"></i>
                            </div>
                            <h3>${App.user.name}</h3>
                            <p>${App.user.email}</p>
                        </div>
                        <nav class="sidebar-nav">
                            <button class="nav-item active" onclick="showDashboardSection('overview', event)">
                                <i class="fas fa-th-large"></i> Overview
                            </button>
                            <button class="nav-item" onclick="showDashboardSection('courses', event)">
                                <i class="fas fa-book-open"></i> My Free Courses
                                <span class="nav-badge">${freeCourses}</span>
                            </button>
                            <button class="nav-item" onclick="showDashboardSection('purchases', event)">
                                <i class="fas fa-shopping-bag"></i> Premium Courses
                                <span class="nav-badge">${paidCoursesCount}</span>
                            </button>
                        </nav>
                    </aside>

                    <main class="dashboard-content">
                        <section id="overview-section" class="content-section active">
                            <div class="section-header">
                                <h1>Welcome back, ${App.user.name.split(' ')[0]}!</h1>
                                <p>Here's your learning progress overview</p>
                            </div>
                            
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <i class="fas fa-book-open"></i>
                                    </div>
                                    <div class="stat-info">
                                        <h3>${totalCourses}</h3>
                                        <p>Enrolled Courses</p>
                                        <small>${freeCourses} Free · ${paidCoursesCount} Premium</small>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <i class="fas fa-trophy"></i>
                                    </div>
                                    <div class="stat-info">
                                        <h3>${completedCourses}</h3>
                                        <p>Completed</p>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <i class="fas fa-check-circle"></i>
                                    </div>
                                    <div class="stat-info">
                                        <h3>${totalLessonsCompleted}</h3>
                                        <p>Lessons Done</p>
                                    </div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <i class="fas fa-rupee-sign"></i>
                                    </div>
                                    <div class="stat-info">
                                        <h3>₹${totalSpent}</h3>
                                        <p>Total Spent</p>
                                    </div>
                                </div>
                            </div>
                            
                            <h3 style="margin: 2rem 0 1rem;">Recent Activity</h3>
                            <div class="activity-feed">
                                ${App.activities?.length > 0 ? 
                                    App.activities.slice(0, 5).map(activity => `
                                        <div class="feed-item">
                                            <div class="feed-icon">
                                                <i class="fas fa-${activity.type === 'enrollment' ? 'graduation-cap' : activity.type === 'purchase' ? 'shopping-cart' : activity.type === 'completion' ? 'trophy' : 'clock'}"></i>
                                            </div>
                                            <div class="feed-content">
                                                <p>${activity.description}</p>
                                                <span class="feed-time">${new Date(activity.timestamp).toLocaleDateString()}</span>
                                            </div>
                                        </div>
                                    `).join('') 
                                    : '<p style="text-align: center; color: var(--text-muted);">No recent activity</p>'}
                            </div>
                        </section>

                        <section id="courses-section" class="content-section">
                            <div class="section-header">
                                <h1>My Free Courses</h1>
                                <p>Your enrolled free courses</p>
                            </div>
                            ${enrolledCourses.filter(c => c.type === 'free').length > 0 ? `
                                <div class="courses-grid">
                                    ${enrolledCourses.filter(c => c.type === 'free').map(course => `
                                        <div class="course-card" data-course="${course.id}">
                                            <div class="course-thumbnail">
                                                <img src="${getYouTubeThumbnail(course.videoId)}" alt="${course.title}">
                                                <span class="playlist-badge"><i class="fas fa-list"></i> ${course.lessons} Lessons</span>
                                            </div>
                                            <div class="course-content">
                                                <h3 class="course-title">${course.title}</h3>
                                                <p style="color: var(--text-secondary); font-size: 0.9rem;">${course.instructor}</p>
                                                <div style="display: flex; justify-content: space-between; margin: 0.5rem 0;">
                                                    <span>Progress</span>
                                                    <span>${App.progress[course.id]?.percentage || 0}%</span>
                                                </div>
                                                <div class="progress-bar">
                                                    <div class="progress-fill" style="width: ${App.progress[course.id]?.percentage || 0}%"></div>
                                                </div>
                                                <button class="btn btn-primary" style="width:100%; margin-top: 1rem;" data-course="${course.id}">
                                                    <i class="fas fa-play"></i> Continue Learning
                                                </button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : '<p style="text-align: center; padding: 2rem;">No free courses yet. <a href="#" data-page="courses">Browse free courses</a></p>'}
                        </section>

                        <section id="purchases-section" class="content-section">
                            <div class="section-header">
                                <h1>Premium Courses</h1>
                                <p>Your purchased premium courses</p>
                            </div>
                            ${enrolledCourses.filter(c => c.type === 'paid').length > 0 ? `
                                <div class="courses-grid">
                                    ${enrolledCourses.filter(c => c.type === 'paid').map(course => `
                                        <div class="course-card" data-course="${course.id}">
                                            <div class="course-thumbnail">
                                                <img src="${getYouTubeThumbnail(course.videoId)}" alt="${course.title}">
                                                <span class="paid-badge"><i class="fas fa-crown"></i> PREMIUM</span>
                                                <span class="playlist-badge"><i class="fas fa-list"></i> ${course.lessons} Lessons</span>
                                            </div>
                                            <div class="course-content">
                                                <h3 class="course-title">${course.title}</h3>
                                                <p style="color: var(--text-secondary); font-size: 0.9rem;">${course.instructor}</p>
                                                <div style="display: flex; justify-content: space-between; margin: 0.5rem 0;">
                                                    <span>Progress</span>
                                                    <span>${App.progress[course.id]?.percentage || 0}%</span>
                                                </div>
                                                <div class="progress-bar">
                                                    <div class="progress-fill" style="width: ${App.progress[course.id]?.percentage || 0}%"></div>
                                                </div>
                                                <button class="btn btn-primary" style="width:100%; margin-top: 1rem;" data-course="${course.id}">
                                                    <i class="fas fa-play"></i> Continue Learning
                                                </button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : '<p style="text-align: center; padding: 2rem;">No premium courses yet. <a href="#" data-page="paid-courses">Browse premium courses</a></p>'}
                            
                            ${App.purchases.length > 0 ? `
                                <h2 style="margin: 3rem 0 1.5rem;">Purchase History</h2>
                                <div class="purchase-history">
                                    ${App.purchases.map(purchase => {
                                        const course = allCourses.find(c => c.id === purchase.courseId);
                                        return `
                                            <div class="purchase-item" data-course="${purchase.courseId}">
                                                <div class="purchase-icon">
                                                    <i class="fas fa-receipt"></i>
                                                </div>
                                                <div class="purchase-details">
                                                    <h4>${purchase.courseTitle}</h4>
                                                    <div class="purchase-meta">
                                                        <span><i class="fas fa-hashtag"></i> ${purchase.transactionId}</span>
                                                        <span><i class="far fa-calendar"></i> ${formatDate(purchase.paymentDate)}</span>
                                                        <span><i class="fas fa-credit-card"></i> ${purchase.paymentMethod}</span>
                                                    </div>
                                                </div>
                                                <div style="text-align: right;">
                                                    <div class="purchase-amount">₹${purchase.amount}</div>
                                                    <span class="purchase-status status-success">Completed</span>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            ` : ''}
                        </section>
                    </main>
                </div>
            `;
        }

        function showDashboardSection(section, event) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${section}-section`).classList.add('active');
        }

        function setupCoursesFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    filterCourses(this.dataset.filter);
                });
            });
        }

        function filterCourses(filter) {
            let courses = App.currentPage === 'paid-courses' ? App.paidCourses : App.courses;
            
            const filtered = filter === 'all' 
                ? courses 
                : courses.filter(c => c.category === filter);
            
            const grid = document.getElementById('courses-grid');
            if (grid) grid.innerHTML = filtered.map(c => renderCourseCard(c)).join('');
        }

        function setupCoursesSearch() {
            document.getElementById('search-courses')?.addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                let courses = App.currentPage === 'paid-courses' ? App.paidCourses : App.courses;
                
                if (query.length < 2) {
                    filterCourses(document.querySelector('.filter-btn.active')?.dataset.filter || 'all');
                    return;
                }
                
                const filtered = courses.filter(c => 
                    c.title.toLowerCase().includes(query) || 
                    c.instructor.toLowerCase().includes(query)
                );
                
                document.getElementById('courses-grid').innerHTML = filtered.map(c => renderCourseCard(c)).join('');
            });
        }

        // Make functions globally available
        window.enrollInCourse = enrollInCourse;
        window.openCoursePlayer = openCoursePlayer;
        window.showDashboardSection = showDashboardSection;
        window.processPayment = processPayment;
        window.selectPaymentMethod = selectPaymentMethod;
        window.markLessonComplete = markLessonComplete;
        window.navigateTo = navigateTo;
    </script>

    <!-- ======================================== -->
    <!-- CHATBOT IMPLEMENTATION - ADDED AT THE END -->
    <!-- ======================================== -->
    <script>
        // ========================================
        // CHATGPT-LIKE AI ASSISTANT WITH GEMINI API
        // ========================================
        
        // Gemini API Configuration
        const GEMINI_API_KEY = 'AIzaSyBemlYyeT7wCloXv56VTDyNO_AtoVZn0ZI';
        const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent';
        
        // Chat state
        let chatMessages = [];
        let isChatOpen = false;
        let isTyping = false;
        
        // Initialize chat when page loads
        document.addEventListener('DOMContentLoaded', function() {
            initializeChat();
        });
        
        function initializeChat() {
            // Add welcome message after a short delay
            setTimeout(() => {
                addChatMessage('bot', '👋 Hello! I\'m your AI assistant powered by Google Gemini. I can help you with anything - general knowledge, programming, science, history, math, or course recommendations. What would you like to know?');
                updateChatUI();
            }, 2000);
        }
        
        async function sendToGemini(userMessage) {
            try {
                const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `You are a helpful AI assistant for OnlineGuru learning platform. You can answer any question - general knowledge, programming, science, math, history, or course-related. Be friendly, detailed, and helpful. Keep responses clear and well-structured.

User: ${userMessage}

Assistant:`
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 800,
                            topP: 0.9,
                            topK: 40
                        }
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API request failed');
                }
                
                const data = await response.json();
                
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    throw new Error('Invalid response format');
                }
            } catch (error) {
                console.error('Gemini API Error:', error);
                return "I apologize, but I'm having trouble connecting right now. Please check your internet connection and try again. If the problem persists, please try again later.";
            }
        }
        
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Clear input and disable
            input.value = '';
            input.disabled = true;
            
            // Add user message to chat
            addChatMessage('user', message);
            updateChatUI();
            
            // Show typing indicator
            isTyping = true;
            updateChatUI();
            
            // Get AI response
            const aiResponse = await sendToGemini(message);
            
            // Hide typing indicator and add response
            isTyping = false;
            addChatMessage('bot', aiResponse);
            updateChatUI();
            
            // Re-enable input
            input.disabled = false;
            input.focus();
        }
        
        function addChatMessage(role, content) {
            chatMessages.push({
                id: Date.now(),
                role: role,
                content: content,
                timestamp: new Date()
            });
            // Limit chat history to last 50 messages
            if (chatMessages.length > 50) {
                chatMessages = chatMessages.slice(-50);
            }
        }
        
        function updateChatUI() {
            const messagesContainer = document.getElementById('chat-messages');
            if (!messagesContainer) return;
            
            messagesContainer.innerHTML = chatMessages.map(msg => `
                <div class="message ${msg.role}">
                    <div class="message-avatar">
                        <i class="fas ${msg.role === 'user' ? 'fa-user' : 'fa-robot'}"></i>
                    </div>
                    <div class="message-content">
                        ${formatChatMessage(msg.content)}
                    </div>
                </div>
            `).join('');
            
            if (isTyping) {
                messagesContainer.innerHTML += `
                    <div class="message bot">
                        <div class="message-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                `;
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function formatChatMessage(content) {
            // Format markdown-style content
            return content
                .replace(/\n/g, '<br>')
                .replace(/```([\s\S]*?)```/g, '<pre style="background: var(--bg-tertiary); padding: 0.75rem; border-radius: var(--radius); overflow-x: auto; margin: 0.5rem 0;"><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code style="background: var(--bg-tertiary); padding: 0.2rem 0.4rem; border-radius: var(--radius-sm);">$1</code>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^# (.*?)$/gm, '<h4 style="margin: 0.5rem 0;">$1</h4>')
                .replace(/^## (.*?)$/gm, '<h5 style="margin: 0.5rem 0;">$1</h5>')
                .replace(/^### (.*?)$/gm, '<h6 style="margin: 0.5rem 0;">$1</h6>');
        }
        
        function toggleChat() {
            isChatOpen = !isChatOpen;
            const chatWindow = document.getElementById('chatbot-window');
            if (chatWindow) {
                chatWindow.classList.toggle('open');
            }
        }
        
        function handleChatKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendChatMessage();
            }
        }
        
        // Add chat HTML to the page
        function addChatHTML() {
            const chatHTML = `
                <button class="chatbot-btn" onclick="toggleChat()">
                    <i class="fas fa-robot"></i>
                </button>
                
                <div id="chatbot-window" class="chatbot-window">
                    <div class="chatbot-header">
                        <h3>
                            <i class="fas fa-robot"></i>
                            AI Assistant
                            <small style="font-size: 0.7rem; margin-left: 0.5rem;">(Gemini AI)</small>
                        </h3>
                        <button class="close-chat" onclick="toggleChat()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <div id="chat-messages" class="chat-messages">
                        <!-- Messages will appear here -->
                    </div>
                    
                    <div class="chat-input-area">
                        <textarea id="chat-input" class="chat-input" rows="2" placeholder="Ask me anything... (Press Enter to send)" onkeypress="handleChatKeyPress(event)"></textarea>
                        <button class="send-btn" onclick="sendChatMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', chatHTML);
        }
        
        // Add chat HTML when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', addChatHTML);
        } else {
            addChatHTML();
        }
        
        // Make functions globally available
        window.toggleChat = toggleChat;
        window.sendChatMessage = sendChatMessage;
        window.handleChatKeyPress = handleChatKeyPress;
    </script>
</body>
</html>
