<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlineGuru - Professional Learning Platform</title>
    <meta name="description" content="Master new skills with 100+ expert-led courses in programming, data science, and more.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========================================
           ONLINE GURU - PROFESSIONAL LEARNING PLATFORM
           ======================================== */

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        /* ===== VARIABLES ===== */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: #e2e8f0;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            
            --radius-sm: 0.375rem;
            --radius: 0.5rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
            
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-primary: #1e293b;
            --bg-secondary: #0f172a;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #475569;
        }

        /* ===== PAGE-SPECIFIC BACKGROUNDS ===== */
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: var(--transition);
            position: relative;
            margin: 0;
            padding: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        body.page-home::before {
            background-image: url('https://images.unsplash.com/photo-1524178232363-1fb2b075b655?q=80&w=2070&auto=format&fit=crop');
        }

        body.page-courses::before,
        body.page-paid-courses::before {
            background-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2070&auto=format&fit=crop');
        }

        body.page-contact::before {
            background-image: url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=2070&auto=format&fit=crop');
        }

        body.page-login::before,
        body.page-register::before {
            background-image: url('https://images.unsplash.com/photo-1524178232363-1fb2b075b655?q=80&w=2070&auto=format&fit=crop');
        }

        body.page-about::before,
        body.page-dashboard::before,
        body.page-course-player::before {
            display: none;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            background: transparent;
        }

        /* ===== LOADER ===== */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loader-content {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            border-bottom: 2px solid var(--primary);
            box-shadow: var(--shadow-md);
        }

        [data-theme="dark"] .header {
            background: var(--bg-primary);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo i {
            font-size: 2rem;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            position: relative;
            padding: 0.5rem 0;
            cursor: pointer;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--primary);
            transition: var(--transition);
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .auth-buttons,
        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        /* ===== MOBILE TOGGLE ===== */
        .mobile-toggle {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: var(--radius);
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ===== CARD STYLES ===== */
        .glass-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero-content {
            max-width: 800px;
            animation: slideUp 1s ease;
            background: var(--bg-primary);
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-xl);
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--primary);
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ===== GRID LAYOUTS ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem 0;
        }

        /* ===== COURSE CARDS ===== */
        .course-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            border: 1px solid var(--border);
            cursor: pointer;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .course-thumbnail {
            position: relative;
            height: 180px;
            overflow: hidden;
            border-bottom: 3px solid var(--primary);
            flex-shrink: 0;
        }

        .course-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .course-card:hover .course-thumbnail img {
            transform: scale(1.05);
        }

        .playlist-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: white;
            padding: 4px 8px;
            border-radius: var(--radius);
            font-size: 0.7rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: var(--shadow-md);
            z-index: 2;
        }

        .paid-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 4px 8px;
            border-radius: var(--radius);
            font-size: 0.7rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: var(--shadow-md);
            z-index: 2;
        }

        .paid-badge i {
            font-size: 0.6rem;
        }

        .course-content {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .course-category {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            align-self: flex-start;
        }

        .course-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 3rem;
        }

        .course-instructor {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .course-instructor i {
            color: var(--primary);
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding: 0.5rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .stars {
            color: #fbbf24;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .course-level {
            background: var(--bg-tertiary);
            padding: 3px 8px;
            border-radius: var(--radius);
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .course-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .course-price small {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        .course-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .course-duration {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .purchase-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .purchase-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(135deg, #d97706, #b45309);
        }

        /* ===== COURSE PLAYER PAGE ===== */
        .course-player-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .course-player-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            border: 2px solid var(--primary);
        }

        .video-section {
            padding: 2rem;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-lg);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .course-info {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }

        .course-info h1 {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            color: var(--primary);
            line-height: 1.3;
        }

        .course-info .instructor {
            color: var(--text-secondary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .course-info .description {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .progress-info {
            background: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: var(--radius);
            margin: 1.5rem 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .progress-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-percentage {
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .mark-complete-btn {
            width: 100%;
            padding: 1rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 1rem;
            margin-top: 1.5rem;
        }

        .mark-complete-btn:hover:not(:disabled) {
            background: #0ca678;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .mark-complete-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .mark-complete-btn i {
            font-size: 1.1rem;
        }

        .playlist-section {
            background: var(--bg-secondary);
            border-left: 2px solid var(--border);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            padding: 1.5rem;
            background: var(--primary);
            color: white;
        }

        .playlist-header h3 {
            margin: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .playlist-header p {
            margin: 0.5rem 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .playlist-items {
            flex: 1;
            overflow-y: auto;
            max-height: 600px;
            padding: 1rem;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            position: relative;
        }

        .playlist-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .playlist-item.completed {
            border-left: 4px solid var(--success);
        }

        .playlist-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .playlist-item-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .playlist-item:hover .playlist-item-number,
        .playlist-item.active .playlist-item-number {
            background: white;
            color: var(--primary);
        }

        .playlist-item-info {
            flex: 1;
            min-width: 0;
        }

        .playlist-item-info h4 {
            margin: 0 0 0.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item-info p {
            font-size: 0.75rem;
            margin: 0;
            opacity: 0.8;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .playlist-item-duration {
            font-size: 0.7rem;
            opacity: 0.7;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .playlist-item-status {
            margin-left: 0.5rem;
            color: var(--success);
        }

        .playlist-item.completed .playlist-item-status i {
            color: var(--success);
        }

        /* ===== DASHBOARD GRID ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: calc(100vh - 80px);
            background: #f8f9fa;
        }

        .dashboard-sidebar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 2rem 1.5rem;
            color: white;
            position: sticky;
            top: 80px;
            height: calc(100vh - 80px);
            overflow-y: auto;
            border-right: 2px solid var(--primary);
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .user-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 3rem;
            color: var(--primary);
            box-shadow: var(--shadow-lg);
        }

        .user-info h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
        }

        .user-info p {
            margin: 0;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }

        .sidebar-nav {
            margin-top: 2rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: var(--radius);
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            transition: var(--transition);
            margin-bottom: 0.5rem;
            cursor: pointer;
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .nav-badge {
            margin-left: auto;
            background: rgba(255,255,255,0.3);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .dashboard-content {
            padding: 2rem;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .content-section.active {
            display: block;
        }

        .section-header {
            margin-bottom: 2rem;
        }

        .section-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            border-radius: var(--radius);
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }

        .stat-info h3 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            color: var(--primary);
        }

        .stat-info p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 1rem;
            font-weight: 500;
        }

        /* ===== FORMS ===== */
        .auth-form {
            max-width: 450px;
            margin: 2rem auto;
            padding: 2.5rem;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            border: 2px solid var(--primary);
        }

        .auth-form h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.2rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            font-size: 1rem;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }

        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* ===== FILTER BUTTONS ===== */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--text-primary);
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary);
            color: white;
        }

        /* ===== SEARCH ===== */
        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            z-index: 1;
        }

        #search-courses {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
            border: 2px solid var(--primary);
            box-sizing: border-box;
        }

        #search-courses:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* ===== PROGRESS BARS ===== */
        .progress-bar {
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 5px;
            transition: width 0.8s ease;
        }

        /* ===== ACTIVITY FEED ===== */
        .activity-feed {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        .feed-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .feed-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .feed-content {
            flex: 1;
        }

        .feed-content p {
            margin: 0 0 0.25rem 0;
            color: var(--text-primary);
            font-weight: 500;
        }

        .feed-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ===== PAYMENT MODAL ===== */
        .payment-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            padding: 1rem;
            box-sizing: border-box;
        }

        .payment-modal-content {
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.3s ease;
            border: 2px solid var(--primary);
        }

        .payment-modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 2rem;
            text-align: center;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .payment-modal-header i {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.2);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            display: inline-block;
        }

        .payment-modal-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .payment-body {
            padding: 2rem;
        }

        .payment-summary {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 2px dashed var(--primary);
            margin-bottom: 2rem;
        }

        .payment-summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.5rem 0;
            color: var(--text-primary);
        }

        .payment-summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--border);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .payment-form .form-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .payment-form .form-section h3 {
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .payment-form .form-section h3 i {
            color: var(--primary);
        }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .payment-method {
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .payment-method:hover,
        .payment-method.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .payment-method i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .payment-method span {
            display: block;
            font-weight: 600;
            color: var(--text-primary);
        }

        .bank-details {
            display: none;
            animation: slideDown 0.3s ease;
        }

        .bank-details.show {
            display: block;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        .payment-terms {
            margin: 1.5rem 0;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .payment-terms label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .payment-terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .payment-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .payment-actions button {
            flex: 1;
            padding: 1rem;
        }

        /* ===== PURCHASE HISTORY ===== */
        .purchase-history {
            margin-top: 2rem;
        }

        .purchase-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.25rem;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
        }

        .purchase-item:hover {
            transform: translateX(5px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }

        .purchase-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .purchase-details {
            flex: 1;
        }

        .purchase-details h4 {
            margin: 0 0 0.5rem 0;
            color: var(--text-primary);
        }

        .purchase-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .purchase-amount {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .purchase-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-success {
            background: #10b981;
            color: white;
        }

        /* ===== NOTIFICATIONS ===== */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-primary);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            max-width: 400px;
            border-left: 4px solid;
            border: 2px solid var(--primary);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-success {
            border-left-color: var(--success);
        }

        .notification-error {
            border-left-color: var(--danger);
        }

        .notification-warning {
            border-left-color: var(--warning);
        }

        .notification-info {
            border-left-color: var(--info);
        }

        .notification-close {
            background: none;
            border: none;
            margin-left: auto;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            color: var(--text-secondary);
        }

        .notification-close:hover {
            opacity: 1;
        }

        /* ===== FOOTER ===== */
        .footer {
            background: var(--bg-primary);
            border-top: 3px solid var(--primary);
            margin-top: 4rem;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
        }

        .footer-grid {
            max-width: 1280px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            padding: 3rem 2rem;
        }

        .footer-col h4 {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .footer-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-links li {
            margin-bottom: 0.75rem;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            font-weight: 500;
        }

        .footer-links a:hover {
            color: var(--primary);
            padding-left: 5px;
        }

        .text-center {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border);
            font-weight: 500;
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: var(--transition);
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            background: var(--bg-primary);
            border: 1px solid var(--border);
        }

        .back-btn:hover {
            color: var(--primary);
            transform: translateX(-5px);
            border-color: var(--primary);
        }

        .back-btn i {
            font-size: 0.9rem;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .course-player-grid {
                grid-template-columns: 1fr;
            }
            
            .playlist-section {
                border-left: none;
                border-top: 2px solid var(--border);
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--bg-primary);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;
                border-bottom: 3px solid var(--primary);
                box-shadow: var(--shadow-lg);
            }
            
            .nav-links.mobile-open {
                display: flex;
            }
            
            .mobile-toggle {
                display: flex;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .hero-content {
                padding: 1.5rem;
            }
            
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .dashboard-sidebar {
                position: fixed;
                left: -300px;
                top: 80px;
                width: 280px;
                transition: left 0.3s ease;
                z-index: 90;
                box-shadow: var(--shadow-xl);
            }
            
            .dashboard-sidebar.active {
                left: 0;
            }
            
            .courses-grid {
                grid-template-columns: 1fr;
            }
            
            .footer-grid {
                grid-template-columns: 1fr;
            }
            
            .payment-methods {
                grid-template-columns: 1fr;
            }
            
            .payment-actions {
                flex-direction: column;
            }
            
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .course-player-container {
                padding: 1rem;
            }
            
            .video-section {
                padding: 1rem;
            }
            
            .course-info h1 {
                font-size: 1.5rem;
            }
            
            .purchase-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            
            .purchase-meta {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            
            .hero h1 {
                font-size: 1.5rem;
            }
            
            .hero-content {
                padding: 1.5rem;
            }
            
            .section-header h1 {
                font-size: 1.5rem;
            }
            
            .filter-buttons {
                flex-direction: column;
            }
            
            .filter-btn {
                width: 100%;
            }
            
            .course-footer {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .purchase-btn, .btn-primary {
                width: 100%;
                justify-content: center;
            }
            
            .notification {
                left: 20px;
                right: 20px;
                max-width: none;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .stat-card {
                padding: 1rem;
            }
        }

        /* ===== CHATBOT STYLES ===== */
        .chatbot-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-xl);
            transition: var(--transition);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .chatbot-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .chatbot-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            height: 550px;
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            transform: scale(0);
            opacity: 0;
            transition: all 0.3s ease;
            border: 2px solid var(--primary);
        }

        .chatbot-window.open {
            transform: scale(1);
            opacity: 1;
        }

        .chatbot-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chatbot-header h3 {
            margin: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .close-chat {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .close-chat:hover {
            transform: scale(1.1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.5rem;
            animation: slideUp 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .message.user .message-avatar {
            background: var(--primary);
            color: white;
            order: 1;
        }

        .message.bot .message-avatar {
            background: var(--bg-tertiary);
            color: var(--primary);
        }

        .message-content {
            max-width: 70%;
            padding: 0.75rem;
            border-radius: var(--radius);
            background: var(--bg-secondary);
            color: var(--text-primary);
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--primary);
            color: white;
        }

        .message.bot .message-content {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
        }

        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('onlineguru_theme') || 'light';
            App.theme = savedTheme;
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        function toggleTheme() {
            App.theme = App.theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', App.theme);
            localStorage.setItem('onlineguru_theme', App.theme);
            render();
        }

        function checkAuth() {
            const userStr = localStorage.getItem('onlineguru_user');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    App.user = user;
                    loadUserData();
                } catch (error) {
                    console.error('Error loading user:', error);
                    logout();
                }
            } else {
                App.user = null;
            }
        }

        function loadUserData() {
            if (!App.user) return;
            
            const userId = App.user.id;
            
            const enrollmentsStr = localStorage.getItem('onlineguru_enrollments');
            if (enrollmentsStr) {
                const enrollments = JSON.parse(enrollmentsStr);
                App.enrollments = enrollments[userId] || [];
            } else {
                App.enrollments = [];
            }
            
            const purchasesStr = localStorage.getItem('onlineguru_purchases');
            if (purchasesStr) {
                const purchases = JSON.parse(purchasesStr);
                App.purchases = purchases[userId] || [];
            } else {
                App.purchases = [];
            }
            
            const progressStr = localStorage.getItem('onlineguru_progress');
            if (progressStr) {
                const progress = JSON.parse(progressStr);
                App.progress = progress[userId] || {};
            } else {
                App.progress = {};
            }
            
            const certsStr = localStorage.getItem('onlineguru_certificates');
            if (certsStr) {
                const certs = JSON.parse(certsStr);
                App.certificates = certs[userId] || [];
            } else {
                App.certificates = [];
            }
            
            const activitiesStr = localStorage.getItem('onlineguru_activities');
            if (activitiesStr) {
                const activities = JSON.parse(activitiesStr);
                App.activities = activities[userId] || [];
            } else {
                App.activities = [];
            }
        }

        function login(email, password) {
            const users = JSON.parse(localStorage.getItem('onlineguru_users')) || [];
            const user = users.find(u => u.email === email.toLowerCase().trim() && u.password === password);
            
            if (user) {
                const userWithoutPassword = { ...user };
                delete userWithoutPassword.password;
                
                App.user = userWithoutPassword;
                localStorage.setItem('onlineguru_user', JSON.stringify(userWithoutPassword));
                loadUserData();
                addActivity('login', 'Logged into account');
                showNotification(`Welcome back, ${user.name}!`, 'success');
                navigateTo('dashboard');
                render();
                return true;
            }
            
            showNotification('Invalid email or password', 'error');
            return false;
        }

        function register(userData) {
            const { name, email, phone, password, confirmPassword } = userData;
            
            if (!name || !email || !phone || !password || !confirmPassword) {
                showNotification('All fields are required', 'error');
                return false;
            }
            
            if (password.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return false;
            }
            
            if (password !== confirmPassword) {
                showNotification('Passwords do not match', 'error');
                return false;
            }
            
            if (!/^\d{10}$/.test(phone)) {
                showNotification('Please enter a valid 10-digit phone number', 'error');
                return false;
            }
            
            const users = JSON.parse(localStorage.getItem('onlineguru_users')) || [];
            
            if (users.find(u => u.email === email)) {
                showNotification('Email already exists', 'error');
                return false;
            }
            
            const newUser = {
                id: Date.now().toString(),
                name: name.trim(),
                email: email.toLowerCase().trim(),
                phone: phone.trim(),
                password: password,
                createdAt: new Date().toISOString(),
                settings: { notifications: 'all' }
            };
            
            users.push(newUser);
            localStorage.setItem('onlineguru_users', JSON.stringify(users));
            
            showNotification('Registration successful! Please login.', 'success');
            navigateTo('login');
            render();
            return true;
        }

        function logout() {
            localStorage.removeItem('onlineguru_user');
            App.user = null;
            App.enrollments = [];
            App.purchases = [];
            App.progress = {};
            App.certificates = [];
            App.activities = [];
            App.currentPage = 'home';
            showNotification('Logged out successfully', 'success');
            render();
            window.scrollTo(0, 0);
        }

        function enrollInCourse(courseId) {
            if (!App.user) {
                showNotification('Please login to enroll', 'warning');
                navigateTo('login');
                return false;
            }
            
            if (App.enrollments.includes(courseId)) {
                showNotification('Already enrolled in this course', 'info');
                return false;
            }
            
            App.enrollments.push(courseId);
            
            const allEnrollments = JSON.parse(localStorage.getItem('onlineguru_enrollments')) || {};
            allEnrollments[App.user.id] = App.enrollments;
            localStorage.setItem('onlineguru_enrollments', JSON.stringify(allEnrollments));
            
            if (!App.progress[courseId]) {
                App.progress[courseId] = {
                    percentage: 0,
                    completedLessons: 0,
                    totalLessons: 10,
                    lastAccessed: new Date().toISOString(),
                    completedLessonsList: []
                };
            }
            
            const allProgress = JSON.parse(localStorage.getItem('onlineguru_progress')) || {};
            allProgress[App.user.id] = App.progress;
            localStorage.setItem('onlineguru_progress', JSON.stringify(allProgress));
            
            const allCourses = [...App.courses, ...App.paidCourses];
            const course = allCourses.find(c => c.id === courseId);
            addActivity('enrollment', `Enrolled in ${course.title}`);
            showNotification('Enrolled successfully!', 'success');
            
            render();
            return true;
        }

        function purchaseCourse(courseId, paymentDetails) {
            if (!App.user) {
                showNotification('Please login to purchase', 'warning');
                navigateTo('login');
                return false;
            }
            
            const course = App.paidCourses.find(c => c.id === courseId);
            if (!course) return false;
            
            if (App.purchases.some(p => p.courseId === courseId)) {
                showNotification('Already purchased this course', 'info');
                return false;
            }
            
            const purchase = {
                id: `PUR-${Date.now()}-${Math.random().toString(36).substr(2, 6)}`,
                courseId: courseId,
                courseTitle: course.title,
                amount: course.price,
                paymentMethod: paymentDetails.paymentMethod,
                paymentDate: new Date().toISOString(),
                status: 'completed',
                transactionId: `TXN${Date.now()}${Math.floor(Math.random() * 1000)}`,
                bankDetails: {
                    accountHolderName: paymentDetails.accountHolderName || App.user.name,
                    bankName: paymentDetails.bankName || 'N/A',
                    accountNumber: paymentDetails.accountNumber ? '****' + paymentDetails.accountNumber.slice(-4) : null,
                    ifscCode: paymentDetails.ifscCode || 'N/A',
                    upiId: paymentDetails.upiId || 'N/A'
                }
            };
            
            App.purchases.push(purchase);
            
            const allPurchases = JSON.parse(localStorage.getItem('onlineguru_purchases')) || {};
            allPurchases[App.user.id] = App.purchases;
            localStorage.setItem('onlineguru_purchases', JSON.stringify(allPurchases));
            
            if (!App.enrollments.includes(courseId)) {
                App.enrollments.push(courseId);
                const allEnrollments = JSON.parse(localStorage.getItem('onlineguru_enrollments')) || {};
                allEnrollments[App.user.id] = App.enrollments;
                localStorage.setItem('onlineguru_enrollments', JSON.stringify(allEnrollments));
            }
            
            if (!App.progress[courseId]) {
                App.progress[courseId] = {
                    percentage: 0,
                    completedLessons: 0,
                    totalLessons: course.lessons || 10,
                    lastAccessed: new Date().toISOString(),
                    purchaseId: purchase.id,
                    completedLessonsList: []
                };
                
                const allProgress = JSON.parse(localStorage.getItem('onlineguru_progress')) || {};
                allProgress[App.user.id] = App.progress;
                localStorage.setItem('onlineguru_progress', JSON.stringify(allProgress));
            }
            
            addActivity('purchase', `Purchased ${course.title} for ₹${course.price}`);
            showNotification(`Payment successful! Course access granted.`, 'success');
            
            render();
            return true;
        }

        window.selectPaymentMethod = function(method) {
            const methods = document.querySelectorAll('.payment-method');
            methods.forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            document.querySelectorAll('.bank-details').forEach(el => el.classList.remove('show'));
            
            if (method === 'bank') {
                document.getElementById('bank-details').classList.add('show');
            } else if (method === 'card') {
                document.getElementById('card-details').classList.add('show');
            } else if (method === 'upi') {
                document.getElementById('upi-details').classList.add('show');
            }
        };

        window.processPayment = function(courseId) {
            const course = App.paidCourses.find(c => c.id === courseId);
            if (!course) return;
            
            if (!document.getElementById('terms-agree').checked) {
                showNotification('Please agree to the terms and conditions', 'error');
                return;
            }
            
            const selectedMethod = document.querySelector('.payment-method.selected span').textContent.toLowerCase().trim();
            
            let paymentDetails = {
                paymentMethod: selectedMethod,
                accountHolderName: App.user.name
            };
            
            if (selectedMethod.includes('bank')) {
                const accountHolder = document.getElementById('account-holder').value;
                const bankName = document.getElementById('bank-name').value;
                const accountNumber = document.getElementById('account-number').value;
                const confirmAccount = document.getElementById('confirm-account').value;
                const ifscCode = document.getElementById('ifsc-code').value;
                
                if (!accountHolder || !bankName || !accountNumber || !ifscCode) {
                    showNotification('Please fill all bank details', 'error');
                    return;
                }
                
                if (accountNumber !== confirmAccount) {
                    showNotification('Account numbers do not match', 'error');
                    return;
                }
                
                if (accountNumber.length < 9 || accountNumber.length > 18) {
                    showNotification('Please enter a valid account number', 'error');
                    return;
                }
                
                paymentDetails = {
                    ...paymentDetails,
                    accountHolderName: accountHolder,
                    bankName: bankName,
                    accountNumber: accountNumber,
                    ifscCode: ifscCode.toUpperCase()
                };
                
            } else if (selectedMethod.includes('card')) {
                const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
                const expiry = document.getElementById('expiry').value;
                const cvv = document.getElementById('cvv').value;
                const cardHolder = document.getElementById('card-holder').value;
                
                if (!cardNumber || !expiry || !cvv || !cardHolder) {
                    showNotification('Please fill all card details', 'error');
                    return;
                }
                
                if (cardNumber.length !== 16) {
                    showNotification('Please enter a valid 16-digit card number', 'error');
                    return;
                }
                
                if (!/^\d{3}$/.test(cvv)) {
                    showNotification('Please enter a valid CVV', 'error');
                    return;
                }
                
                paymentDetails = {
                    ...paymentDetails,
                    accountHolderName: cardHolder,
                    cardNumber: cardNumber
                };
                
            } else if (selectedMethod.includes('upi')) {
                const upiId = document.getElementById('upi-id').value;
                
                if (!upiId) {
                    showNotification('Please enter UPI ID', 'error');
                    return;
                }
                
                if (!/^[\w.-]+@[\w.-]+$/.test(upiId)) {
                    showNotification('Please enter a valid UPI ID', 'error');
                    return;
                }
                
                paymentDetails = {
                    ...paymentDetails,
                    upiId: upiId
                };
            }
            
            purchaseCourse(courseId, paymentDetails);
            document.querySelector('.payment-modal').remove();
        };

        function openCoursePlayer(courseId, lessonIndex = 0) {
            console.log('Opening course player for course ID:', courseId);
            const allCourses = [...App.courses, ...App.paidCourses];
            const course = allCourses.find(c => c.id === courseId);
            if (!course) {
                console.error('Course not found:', courseId);
                return;
            }
            
            if (!App.enrollments.includes(courseId)) {
                console.log('User not enrolled in course:', courseId);
                showNotification('Please enroll/purchase first', 'warning');
                return;
            }
            
            console.log('Opening course:', course.title);
            App.currentCourse = course;
            App.currentLesson = lessonIndex;
            App.currentPage = 'course-player';
            render();
        }

        function markLessonComplete(courseId, lessonId) {
            if (!App.user) {
                showNotification('Please login to track progress', 'warning');
                return;
            }
            
            if (!App.progress[courseId]) {
                App.progress[courseId] = {
                    percentage: 0,
                    completedLessons: 0,
                    totalLessons: 10,
                    completedLessonsList: []
                };
            }
            
            const progress = App.progress[courseId];
            if (!progress.completedLessonsList.includes(lessonId)) {
                progress.completedLessonsList.push(lessonId);
                progress.completedLessons = progress.completedLessonsList.length;
                progress.percentage = Math.round((progress.completedLessons / progress.totalLessons) * 100);
                progress.lastAccessed = new Date().toISOString();
                
                const allProgress = JSON.parse(localStorage.getItem('onlineguru_progress')) || {};
                allProgress[App.user.id] = App.progress;
                localStorage.setItem('onlineguru_progress', JSON.stringify(allProgress));
                
                showNotification(`Lesson completed! Progress: ${progress.percentage}%`, 'success');
                
                if (progress.percentage >= 100) {
                    generateCertificate(courseId);
                }
                
                if (App.currentPage === 'course-player') {
                    render();
                }
            }
        }

        function generateCertificate(courseId) {
            const allCourses = [...App.courses, ...App.paidCourses];
            const course = allCourses.find(c => c.id === courseId);
            if (!course || !App.user) return null;
            
            if (App.certificates.some(c => c.courseId === courseId)) {
                return null;
            }
            
            const certificate = {
                id: `CERT-${Date.now()}-${Math.random().toString(36).substr(2, 6)}`,
                userId: App.user.id,
                userName: App.user.name,
                courseId: courseId,
                courseName: course.title,
                instructor: course.instructor,
                issueDate: new Date().toISOString(),
                completionDate: new Date().toISOString().split('T')[0],
                type: course.type === 'paid' ? 'Premium' : 'Standard'
            };
            
            App.certificates.push(certificate);
            
            const allCerts = JSON.parse(localStorage.getItem('onlineguru_certificates')) || {};
            allCerts[App.user.id] = App.certificates;
            localStorage.setItem('onlineguru_certificates', JSON.stringify(allCerts));
            
            addActivity('completion', `Earned ${course.type} certificate for ${course.title}`);
            showNotification('🎉 Congratulations! Course completed! Certificate earned!', 'success');
            
            return certificate;
        }

        function addActivity(type, description) {
            if (!App.user) return;
            
            const activity = {
                id: Date.now(),
                type,
                description,
                timestamp: new Date().toISOString()
            };
            
            App.activities = [activity, ...(App.activities || [])].slice(0, 50);
            
            const allActivities = JSON.parse(localStorage.getItem('onlineguru_activities')) || {};
            allActivities[App.user.id] = App.activities;
            localStorage.setItem('onlineguru_activities', JSON.stringify(allActivities));
        }

        function showNotification(message, type = 'info', duration = 3000) {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i>
                <span>${message}</span>
                <button class="notification-close" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            document.body.appendChild(notification);
            setTimeout(() => notification.classList.add('show'), 10);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function generateStars(rating) {
            const fullStars = Math.floor(rating);
            const hasHalf = rating % 1 >= 0.5;
            let stars = '';
            
            for (let i = 0; i < fullStars; i++) stars += '<i class="fas fa-star"></i>';
            if (hasHalf) stars += '<i class="fas fa-star-half-alt"></i>';
            for (let i = fullStars + (hasHalf ? 1 : 0); i < 5; i++) stars += '<i class="far fa-star"></i>';
            return stars;
        }

        function navigateTo(page) {
            App.currentPage = page;
            
            if (page === 'about' || page === 'dashboard' || page === 'course-player') {
                document.body.className = '';
